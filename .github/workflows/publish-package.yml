name: Publish package
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Choose the version type you want to publish
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch
  push:
    tags:
      - 'v*'
  release:
    types: [created]
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    container: node:24.16.0-bookworm@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci

  publish-to-gpr:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    container: node:24.16.0-bookworm@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}

      - name: Bump version
        run: npm version --no-git-tag-version "${RELEASE_TYPE}"
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}

      - name: Publish to GPR
        run: |
          npm config set @fbuireu:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken "${NODE_AUTH_TOKEN}"
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-to-npm:
    name: Publish to npm Registry
    needs: build
    runs-on: ubuntu-latest
    container: node:24.16.0-bookworm@sha256:40ad9f3064e67d6860b4bc3fe1880b2953934fd6320ada990e45fe0efa6badd7
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: npm ci
        if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'release' }}

      - name: Bump version
        run: npm version --no-git-tag-version "${RELEASE_TYPE}"
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}

      - name: Publish to npm
        run: |
          npm config set @fbuireu:registry https://registry.npmjs.org
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}"
          npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
